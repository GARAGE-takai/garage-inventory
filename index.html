<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARAGE — 在庫管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e; --surface3: #222;
    --border: #2a2a2a; --border2: #333;
    --accent: #c8a96e; --accent2: #8b6e42;
    --text: #e8e8e0; --text-muted: #666; --text-dim: #999;
    --success: #c8a96e; --warning: #d4a843; --stopped: #555;
    --stock-ok: #c8a96e;
    --stock-low: #d4a843;
    --stock-zero: #484848;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 100vh; }

  /* ===== HEADER ===== */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0;
    background: rgba(14,14,14,0.96); backdrop-filter: blur(8px);
    z-index: 100; gap: 20px;
  }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; letter-spacing: 0.3em; color: var(--accent); font-weight: 300; flex-shrink: 0; }
  .logo span { font-size: 10px; letter-spacing: 0.2em; color: var(--text-muted); display: block; margin-top: 2px; }
  .stats { display: flex; gap: 18px; font-size: 10px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; }
  .stats strong { color: var(--accent); font-weight: 400; display: block; font-size: 15px; }
  .header-actions { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }

  /* ===== BUTTONS ===== */
  .btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 7px 16px; font-size: 11px; letter-spacing: 0.12em; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #0e0e0e; font-weight: 500; }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: var(--text); }
  .btn-add { background: none; border: 1px solid var(--accent2); color: var(--accent); padding: 7px 18px; font-size: 11px; letter-spacing: 0.12em; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; }
  .btn-add:hover { background: var(--accent); color: #0e0e0e; }
  .btn-danger { border-color: #c0392b; color: #c0392b; }
  .btn-danger:hover { background: #c0392b; color: var(--text); border-color: #c0392b; }
  .btn-sm { padding: 4px 10px; font-size: 10px; }

  /* ===== STICKY NAV ===== */
  .sticky-nav {
    position: sticky; top: 65px; z-index: 95;
    background: var(--bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: stretch;
  }
  .sticky-nav .search-wrap { padding: 10px 16px; border-right: 1px solid var(--border); flex-shrink: 0; min-width: 200px; }
  .sticky-nav .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 10px 7px 28px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.2s; }
  .sticky-nav .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 12px; pointer-events: none; }

  /* ===== GENRE NAV ===== */
  .genre-nav {
    display: flex; gap: 0; overflow-x: auto; flex: 1;
    scrollbar-width: none;
  }
  .genre-nav::-webkit-scrollbar { display: none; }
  .genre-btn {
    background: none; border: none; border-right: 1px solid var(--border);
    color: var(--text-muted); padding: 10px 18px; font-size: 11px;
    letter-spacing: 0.12em; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .genre-btn:hover { color: var(--accent); background: var(--surface); }
  .genre-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: var(--surface); }

  /* ===== FILTER DRAWER ===== */
  .filter-drawer { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; }
  .filter-drawer.hidden { display: none; }
  .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; font-size: 11px; letter-spacing: 0.08em; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; white-space: nowrap; }
  .tab.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  /* ===== MORE MENU ===== */
  .more-menu-wrap { position: relative; }
  .more-menu-btn { font-size: 16px; padding: 7px 12px; letter-spacing: 0; }
  .more-menu { position: absolute; right: 0; top: calc(100% + 6px); background: var(--surface); border: 1px solid var(--border2); min-width: 130px; z-index: 200; }
  .more-menu.hidden { display: none; }
  .more-menu button { display: block; width: 100%; background: none; border: none; border-bottom: 1px solid var(--border); color: var(--text-dim); padding: 10px 16px; font-size: 12px; letter-spacing: 0.08em; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; text-align: left; transition: all 0.2s; }
  .more-menu button:last-child { border-bottom: none; }
  .more-menu button:hover { background: var(--surface2); color: var(--text); }
  .more-menu button.danger { color: #e74c3c; }
  .more-menu button.danger:hover { background: #e74c3c; color: #fff; }
  main { padding: 28px 40px; }
  .category-section { margin-bottom: 44px; }
  .category-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .category-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 400; letter-spacing: 0.2em; color: var(--accent); }
  .category-count { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }

  /* ===== PRODUCT CARD ===== */
  .product-card { background: var(--surface); padding: 14px 16px; transition: background 0.15s; }
  .product-card:hover { background: var(--surface2); }
  .product-card.stopped { opacity: 0.5; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .product-name { font-size: 13px; font-weight: 400; line-height: 1.5; color: var(--text); flex: 1; }
  .product-card.stopped .product-name { text-decoration: line-through; color: var(--text-muted); }
  .product-price { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 8px; }

  /* status */
  .status-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; flex-shrink: 0; padding: 2px 0; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); transition: background 0.2s; }
  .status-toggle.stopped .status-dot { background: var(--stopped); }
  .status-label { font-size: 10px; letter-spacing: 0.08em; color: var(--success); transition: color 0.2s; white-space: nowrap; }
  .status-toggle.stopped .status-label { color: var(--stopped); }

  /* stock */
  .stock-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .stock-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .stock-input { width: 60px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 5px; font-size: 18px; text-align: center; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.2s; }
  .stock-input:focus { border-color: var(--accent); }
  .stock-input.zero { color: var(--stock-zero); } .stock-input.low { color: var(--stock-low); } .stock-input.ok { color: var(--stock-ok); }
  .size-input { width: 64px; background: var(--bg); border: 1px solid var(--border); color: var(--text-dim); padding: 4px 5px; font-size: 12px; text-align: center; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.2s; }
  .size-input:focus { border-color: var(--accent); color: var(--text); }
  .size-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }

  /* variation table */
  .variation-table { width: 100%; border-collapse: collapse; }
  .variation-table td { padding: 3px 0; font-size: 12px; vertical-align: middle; }
  .var-name { color: var(--text-dim); padding-right: 8px; white-space: nowrap; font-size: 11px; }
  .var-stock-cell { width: 62px; }
  .var-stock-input { width: 60px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 3px 4px; font-size: 18px; text-align: center; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.2s; }
  .var-stock-input:focus { border-color: var(--accent); }
  .var-stock-input.zero { color: var(--stock-zero); } .var-stock-input.low { color: var(--stock-low); } .var-stock-input.ok { color: var(--stock-ok); }
  .var-size-cell { width: 68px; padding-left: 8px !important; }
  .var-size-input { width: 62px; background: var(--bg); border: 1px solid var(--border); color: var(--text-dim); padding: 3px 4px; font-size: 11px; text-align: center; font-family: 'Noto Sans JP', sans-serif; outline: none; }
  .var-size-input:focus { border-color: var(--accent); color: var(--text); }

  .stock-badge { font-size: 10px; padding: 2px 8px; letter-spacing: 0.06em; border: 1px solid; white-space: nowrap; font-weight: 400; }
  .badge-zero { color: #555; border-color: #333; background: transparent; }
  .badge-low { color: #0e0e0e; border-color: var(--stock-low); background: var(--stock-low); }
  .badge-ok { color: #0e0e0e; border-color: var(--stock-ok); background: var(--stock-ok); }

  /* memo */
  .memo-toggle-btn { background: none; border: none; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 10px; padding: 5px 0; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.08em; transition: color 0.2s; display: block; width: 100%; text-align: left; margin-top: 10px; }
  .memo-toggle-btn:hover { color: var(--accent); }
  .memo-has-content { color: var(--accent) !important; }
  .memo-wrap.hidden { display: none; }
  .memo-input { width: 100%; background: var(--surface3); border: 1px solid var(--border); color: var(--text-dim); font-size: 11px; font-family: 'Noto Sans JP', sans-serif; padding: 6px 10px; resize: none; outline: none; min-height: 46px; line-height: 1.6; transition: border-color 0.2s, color 0.2s; }
  .memo-input::placeholder { color: var(--text-muted); }
  .memo-input:focus { border-color: var(--accent); color: var(--text); }

  /* ===== GENRE NAV ===== */
  .genre-nav {
    display: flex; gap: 0; overflow-x: auto; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 65px; z-index: 90;
    scrollbar-width: none;
  }
  .genre-nav::-webkit-scrollbar { display: none; }
  .genre-btn {
    background: none; border: none; border-right: 1px solid var(--border);
    color: var(--text-muted); padding: 10px 20px; font-size: 11px;
    letter-spacing: 0.12em; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .genre-btn:hover { color: var(--accent); background: var(--surface); }
  .genre-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: var(--surface); }

  .save-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 10px; padding: 3px 10px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.08em; transition: all 0.2s; white-space: nowrap; }
  .save-btn:hover { border-color: var(--accent); color: var(--accent); }
  .save-btn.saved { border-color: var(--stock-ok); color: var(--stock-ok); }

  /* ===== INLINE VAR ADD ===== */
  .add-var-inline-btn { background: none; border: none; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 10px; padding: 5px 0; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.08em; transition: color 0.2s; display: block; width: 100%; text-align: left; }
  .add-var-inline-btn:hover { color: var(--accent); }
  .inline-var-form { border-top: 1px solid var(--border); padding: 8px 0 4px; display: none; }
  .inline-var-form.open { display: block; }
  .inline-form-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .inline-var-row { display: flex; gap: 6px; align-items: center; margin-bottom: 5px; }
  .inline-var-row .inline-label { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
  .inline-var-row input[type=text] { flex: 1; min-width: 60px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; outline: none; }
  .inline-var-row input[type=text]:focus { border-color: var(--accent); }
  .inline-var-row input[type=number] { width: 60px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 5px; font-size: 18px; text-align: center; font-family: 'Noto Sans JP', sans-serif; outline: none; }
  .inline-var-row input[type=number]:focus { border-color: var(--accent); }
  .ring-size-inline { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .ring-size-inline .size-check { display: none; }
  .size-toggle-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; padding: 6px 10px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.05em; transition: all 0.15s; }
  .size-toggle-btn.selected { background: var(--accent); border-color: var(--accent); color: #0e0e0e; }
  .inline-var-actions { display: flex; gap: 6px; margin-top: 6px; }
  .btn-inline { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 4px 12px; font-size: 10px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.08em; transition: all 0.2s; }
  .btn-inline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-inline-ok { background: var(--accent); border-color: var(--accent); color: #0e0e0e; }
  .btn-inline-ok:hover { background: var(--accent2); }

  /* ===== ADD PRODUCT MODAL ===== */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border: 1px solid var(--border2); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 0.2em; color: var(--accent); }
  .modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* form fields */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 10px; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* 商品タイプ切り替え */
  .type-tabs { display: flex; gap: 0; margin-bottom: 16px; }
  .type-tab { flex: 1; background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 8px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; text-align: center; letter-spacing: 0.05em; }
  .type-tab:not(:first-child) { border-left: none; }
  .type-tab.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  /* バリエーション追加 */
  .var-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .var-item { display: flex; gap: 6px; align-items: center; }
  .var-item input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; outline: none; }
  .var-item input:focus { border-color: var(--accent); }
  .var-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px; }
  .var-remove:hover { color: #c0392b; }
  .add-var-btn { background: none; border: 1px dashed var(--border2); color: var(--text-muted); padding: 6px 12px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; width: 100%; transition: all 0.2s; letter-spacing: 0.08em; }
  .add-var-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ring sizes */
  .ring-sizes-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .size-check { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .size-check input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; }
  .size-check span { font-size: 11px; color: var(--text-dim); }

  .section-label { font-size: 10px; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; }

  .empty-msg { text-align: center; padding: 80px 0; color: var(--text-muted); font-size: 13px; letter-spacing: 0.1em; }
  .toast { position: fixed; bottom: 28px; right: 36px; background: var(--surface2); border: 1px solid var(--accent); color: var(--accent); padding: 10px 22px; font-size: 12px; letter-spacing: 0.1em; z-index: 9999; animation: fadeUp 0.25s ease; pointer-events: none; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }

  @media (max-width: 768px) {
    header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; top: 0; }
    .stats { gap: 10px; }
    .field-row { grid-template-columns: 1fr; }
    main { padding: 16px; }

    /* sticky-navをiPhoneで縦並びに */
    .sticky-nav {
      flex-direction: column;
      top: 0;
      position: sticky;
      z-index: 95;
    }
    .sticky-nav .search-wrap {
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      min-width: unset;
      width: 100%;
    }
    .sticky-nav .search-wrap input {
      width: 100%;
    }
    .genre-nav {
      width: 100%;
      overflow-x: auto;
    }
    .genre-btn {
      padding: 10px 14px;
      font-size: 11px;
    }

    /* headerをスクロールで隠す（stickyNavだけ残す） */
    header {
      position: relative;
    }
  }
</style>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- ===== HEADER ===== -->
<header>
  <div class="logo">GARAGE<span>在庫管理システム</span></div>
  <div class="stats">
    <div>商品<strong id="statTotal">—</strong></div>
    <div>在庫あり<strong id="statIn">—</strong></div>
    <div>在庫なし<strong id="statOut">—</strong></div>
    <div>販売停止<strong id="statStopped">—</strong></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-add" onclick="openAddModal()">＋ 新作を追加</button>
    <button class="btn btn-primary" onclick="exportCSV()">CSV出力</button>
    <div class="more-menu-wrap">
      <button class="btn more-menu-btn" onclick="toggleMoreMenu(this)">⋯</button>
      <div class="more-menu hidden">
        <button onclick="openFilterMenu();closeMoreMenu()">フィルター</button>
        <button class="danger" onclick="closeMoreMenu();resetAll()">リセット</button>
      </div>
    </div>
  </div>
</header>

<!-- ===== STICKY NAV ===== -->
<div class="sticky-nav" id="stickyNav">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="商品名で検索..." oninput="filterProducts()">
  </div>
  <div class="genre-nav" id="genreNav">
    <button class="genre-btn" onclick="scrollToCategory('リング')">リング</button>
    <button class="genre-btn" onclick="scrollToCategory('ネックレス・ペンダント')">ネックレス・ペンダント</button>
    <button class="genre-btn" onclick="scrollToCategory('ピアス・イヤーカフ')">ピアス・イヤーカフ</button>
    <button class="genre-btn" onclick="scrollToCategory('バッジ・ブローチ')">バッジ・ブローチ</button>
    <button class="genre-btn" onclick="scrollToCategory('バングル・ブレスレット')">バングル・ブレスレット</button>
    <button class="genre-btn" onclick="scrollToCategory('その他')">その他</button>
  </div>
</div>

<!-- ===== FILTER DRAWER ===== -->
<div class="filter-drawer hidden" id="filterDrawer">
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all',this)">すべて</button>
    <button class="tab" onclick="setFilter('zero',this)">在庫なし</button>
    <button class="tab" onclick="setFilter('low',this)">残りわずか</button>
    <button class="tab" onclick="setFilter('ok',this)">在庫あり</button>
    <button class="tab" onclick="setFilter('active',this)">販売中</button>
    <button class="tab" onclick="setFilter('stopped',this)">販売停止</button>
    <button class="tab" onclick="setFilter('memo',this)">メモあり</button>
  </div>
</div>

<main id="mainContent"></main>

<!-- ===== ADD PRODUCT MODAL ===== -->
<div class="modal-overlay hidden" id="addModal" onclick="closeModalIfOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">新作を追加</span>
      <button class="modal-close" onclick="closeAddModal()">×</button>
    </div>
    <div class="modal-body">
      <!-- 商品タイプ -->
      <div class="type-tabs" id="typeTabs">
        <button class="type-tab active" onclick="setProductType('simple',this)">バリエーションなし</button>
        <button class="type-tab" onclick="setProductType('variation',this)">バリエーションあり</button>
        <button class="type-tab" onclick="setProductType('ring',this)">リング（サイズ選択）</button>
      </div>

      <div class="field-row">
        <div class="field">
          <label>商品名 *</label>
          <input type="text" id="newName" placeholder="例：ヤドリギ リング">
        </div>
        <div class="field">
          <label>ジャンル *</label>
          <select id="newCategory">
            <option value="リング">リング</option>
            <option value="ネックレス・ペンダント">ネックレス・ペンダント</option>
            <option value="ピアス・イヤーカフ">ピアス・イヤーカフ</option>
            <option value="バッジ・ブローチ">バッジ・ブローチ</option>
            <option value="バングル・ブレスレット">バングル・ブレスレット</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>価格（円）*</label>
          <input type="number" id="newPrice" placeholder="例：22000" min="0">
        </div>
        <div class="field">
          <label>初期在庫数</label>
          <input type="number" id="newStock" placeholder="0" min="0" value="0">
        </div>
      </div>

      <!-- バリエーションなし：サイズ入力 -->
      <div id="simpleSection">
        <div class="field">
          <label>サイズ（任意）</label>
          <input type="text" id="newSize" placeholder="例：#13、M、ロング など">
        </div>
      </div>

      <!-- バリエーションあり -->
      <div id="variationSection" style="display:none">
        <span class="section-label">バリエーション</span>
        <div class="var-list" id="varList">
          <div class="var-item">
            <input type="text" placeholder="例：シルバー、#7、S など">
            <button class="var-remove" onclick="removeVar(this)">×</button>
          </div>
        </div>
        <button class="add-var-btn" onclick="addVarRow()">＋ バリエーションを追加</button>
      </div>

      <!-- リング：サイズチェックボックス -->
      <div id="ringSizeSection" style="display:none">
        <span class="section-label">展開サイズを選択</span>
        <div class="ring-sizes-wrap" id="ringSizes"></div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAddModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="addProduct()">追加する</button>
    </div>
  </div>
</div>

<script>
// ========== SUPABASE CONFIG ==========
const SUPABASE_URL = 'https://tkxuressbabxtpwzzlez.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRreHVyZXNzYmFieHRwd3p6bGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTU1NzcsImV4cCI6MjA4ODg3MTU3N30.l2t3YbAI5qOOdHat95XANank3Pw-rA0e0RQ2YTtw5N8';

async function sbUpsert(id, fields){
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/inventory`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id, ...fields, updated_at: new Date().toISOString() })
    });
  } catch(e){ console.error('保存エラー:', e); }
}

async function sbGetAll(){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/inventory?select=*&limit=10000`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return await r.json();
}

// ========== LOCAL STORAGE (バックアップ) ==========
const LS_KEY = 'garage_inventory_v1';
function saveToLocal(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({ stockData, statusData, memoData, sizeData, customProducts, productCategories }));
  } catch(e){}
}
function loadFromLocal(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    stockData = data.stockData || {};
    statusData = data.statusData || {};
    memoData = data.memoData || {};
    sizeData = data.sizeData || {};
    customProducts = data.customProducts || [];
    productCategories = data.productCategories || {};
  } catch(e){}

// ========== HELPERS ==========
function skey(n,v){ return v ? n+'::'+v : n; }
function getStock(n,v){ return stockData[skey(n,v)] ?? 0; }
function setStock(n,v,val){ stockData[skey(n,v)] = Math.max(0,parseInt(val)||0); updateStats(); }
function getStatus(n){ return statusData[n] ?? 'active'; }
function setStatus(n,s){ statusData[n]=s; updateStats(); }
function getMemo(n){ return memoData[n] ?? ''; }
function setMemo(n,val){ memoData[n]=val; }
function getSize(n,v){ return sizeData[skey(n,v)] ?? ''; }
function setSize(n,v,val){ sizeData[skey(n,v)] = val; }

function getStockClass(v){ return v===0?'zero':v<=2?'low':'ok'; }
function getBadgeLabel(cls,isVar){
  if(cls==='zero') return isVar?'—':'在庫なし';
  if(cls==='low') return isVar?'残少':'残りわずか';
  return isVar?'OK':'在庫あり';
}

function setStock(n,v,val){
  stockData[skey(n,v)] = Math.max(0,parseInt(val)||0);
  updateStats(); saveToLocal();
  sbUpsert(skey(n,v), { stock: stockData[skey(n,v)] });
}
function setStatus(n,s){
  statusData[n]=s; updateStats(); saveToLocal();
  sbUpsert(n+'::__status', { status: s });
}
function setMemo(n,val){
  memoData[n]=val; saveToLocal();
  sbUpsert(n+'::__memo', { memo: val });
}
function setSize(n,v,val){
  sizeData[skey(n,v)]=val; saveToLocal();
  sbUpsert(skey(n,v)+'::__size', { size: val });
}
function getTotalStock(p){
  if(!p.variations.length) return getStock(p.name,null);
  return p.variations.reduce((s,v)=>s+getStock(p.name,v.variation),0);
}

function eh(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function eq(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ========== STATS ==========
function updateStats(){
  let total=0, inS=0, outS=0, stopped=0;
  getAllProducts().forEach(p=>{
    if(getStatus(p.name)==='stopped') stopped++;
    if(!p.variations.length){
      total++; getStock(p.name,null)>0?inS++:outS++;
    } else {
      p.variations.forEach(v=>{ total++; getStock(p.name,v.variation)>0?inS++:outS++; });
    }
  });
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statIn').textContent=inS;
  document.getElementById('statOut').textContent=outS;
  document.getElementById('statStopped').textContent=stopped;
}

// ========== FILTER ==========
let currentFilter='all', currentSearch='';
function setFilter(f,el){ currentFilter=f; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); renderProducts(); }
function filterProducts(){ currentSearch=document.getElementById('searchInput').value.trim(); renderProducts(); }

function matchesFilter(p){
  const st=getStatus(p.name), tot=getTotalStock(p);
  if(currentFilter==='active') return st==='active';
  if(currentFilter==='stopped') return st==='stopped';
  if(currentFilter==='memo') return getMemo(p.name).trim()!=='';
  if(currentFilter==='zero') return tot===0;
  if(currentFilter==='low'){
    if(!p.variations.length){const s=getStock(p.name,null);return s>0&&s<=2;}
    return p.variations.some(v=>{const s=getStock(p.name,v.variation);return s>0&&s<=2;});
  }
  if(currentFilter==='ok') return tot>2;
  return true;
}

function getCategoryForProduct(p){
  // 個別上書き
  if(CATEGORY_OVERRIDES[p.name]) return CATEGORY_OVERRIDES[p.name];
  // カスタム商品で明示カテゴリがある場合
  if(productCategories[p.name]) return productCategories[p.name];
  for(const[cat,fn] of Object.entries(CATEGORIES_MAP)){
    if(cat==='その他') continue;
    if(fn(p)) return cat;
  }
  return 'その他';
}

// ========== RENDER ==========
function renderProducts(){
  const main=document.getElementById('mainContent');
  const q=currentSearch.toLowerCase();
  const filtered=getAllProducts().filter(p=>(!q||p.name.toLowerCase().includes(q))&&matchesFilter(p));
  if(!filtered.length){main.innerHTML='<div class="empty-msg">該当する商品がありません</div>';return;}

  // カテゴリ別まとめ
  const categorized={};
  const catOrder=['リング','ネックレス・ペンダント','ピアス・イヤーカフ','バッジ・ブローチ','バングル・ブレスレット','その他'];
  catOrder.forEach(cat=>{ categorized[cat]=[]; });
  filtered.forEach(p=>{ const cat=getCategoryForProduct(p); if(categorized[cat]) categorized[cat].push(p); else categorized['その他'].push(p); });

  let html='';
  catOrder.forEach(cat=>{
    const items=categorized[cat];
    if(!items.length) return;
    html+=`<div class="category-section" id="cat-${cat.replace(/[・\s]/g,'-')}">
      <div class="category-header">
        <span class="category-title">${cat}</span>
        <span class="category-count">${items.length} 点</span>
      </div>
      <div class="product-grid">`;

    items.forEach(p=>{ html+=renderCard(p); });
    html+=`</div></div>`;
  });
  main.innerHTML=html;
  updateStats();
}

function renderCard(p){
  const isStopped=getStatus(p.name)==='stopped';
  const memo=getMemo(p.name);
  const hasMemo=memo.trim()!=='';
  const memoPreview=hasMemo?(memo.length>28?memo.slice(0,28)+'…':memo):'';
  const isRing=p.isRing||false;
  const isCustom=customProducts.includes(p);

  let html=`<div class="product-card${isStopped?' stopped':''}">
    <div class="card-top">
      <div class="product-name">${eh(p.name)}${isCustom?'<span style="font-size:9px;color:var(--accent2);margin-left:6px;letter-spacing:0.1em">NEW</span>':''}</div>
      <div class="status-toggle${isStopped?' stopped':''}" onclick="toggleStatus('${eq(p.name)}',this)" title="クリックで切替">
        <div class="status-dot"></div>
        <span class="status-label">${isStopped?'販売停止':'販売中'}</span>
      </div>
    </div>
    <div class="product-price">¥${p.price.toLocaleString()}</div>`;

  if(!p.variations.length){
    if(isRing){
      // リングはバリエーションなしの単体入力欄を表示しない（＋ボタンから入力）
    } else {
      // バリエーションなし（リング以外）
      const s=getStock(p.name,null), cls=getStockClass(s);
      html+=`<div class="stock-row">
        <span class="stock-label">在庫</span>
        <input type="number" class="stock-input ${cls}" value="${s}" min="0"
          onfocus="this.select()"
          onchange="syncBadge(this,false)"
          oninput="syncBadge(this,false)">
        <span class="stock-badge badge-${cls}">${getBadgeLabel(cls,false)}</span>
        <button class="save-btn" onclick="saveStockBtn(this,'${eq(p.name)}',null)">保存</button>
      </div>`;
    }
  } else {
    // バリエーションあり（サイズ順にソート）
    const sortedVars = [...p.variations].sort((a,b)=>{
      const va=a.variation, vb=b.variation;
      const smlA=va.match(/\s*(S|M|L)\s*$/);
      const smlB=vb.match(/\s*(S|M|L)\s*$/);
      if(smlA&&smlB){
        const prefixA=va.slice(0,va.lastIndexOf(smlA[0])).trim();
        const prefixB=vb.slice(0,vb.lastIndexOf(smlB[0])).trim();
        // まずプレフィックス（K18・ロジウムなど）で並べる
        const pc=prefixA.localeCompare(prefixB,'ja');
        if(pc!==0) return pc;
        // 同じプレフィックスならS→M→L順
        return (SIZE_ORDER[smlA[1]]??99)-(SIZE_ORDER[smlB[1]]??99);
      }
      // 号数ソート
      const na=parseInt(va.replace(/[^0-9]/g,''))||0;
      const nb=parseInt(vb.replace(/[^0-9]/g,''))||0;
      if(na&&nb) return na-nb;
      return va.localeCompare(vb,'ja');
    });
    html+=`<table class="variation-table">`;
    sortedVars.forEach(v=>{
      const s=getStock(p.name,v.variation), cls=getStockClass(s);
      html+=`<tr>
        <td class="var-name">${eh(v.variation)}</td>
        <td class="var-stock-cell">
          <input type="number" class="var-stock-input ${cls}" value="${s}" min="0"
            onfocus="this.select()"
            onchange="syncBadge(this,true)"
            oninput="syncBadge(this,true)">
        </td>
        <td><span class="stock-badge badge-${cls}">${getBadgeLabel(cls,true)}</span></td>
        <td><button class="save-btn" onclick="saveStockBtn(this,'${eq(p.name)}','${eq(v.variation)}')">保存</button></td>
      </tr>`;
    });
    html+=`</table>`;
  }

  // バリエーション追加ボタン＆インラインフォーム
  const varFormId=`vf-${btoa(encodeURIComponent(p.name)).replace(/[^a-zA-Z0-9]/g,'')}`;
  html+=`<button class="add-var-inline-btn" onclick="toggleInlineVarForm('${eq(p.name)}','${varFormId}',${isRing},this)">＋ バリエーション / サイズを追加</button>
  <div class="inline-var-form" id="${varFormId}">
    <span class="inline-form-label">${isRing?'号数を選択':'バリエーション名と在庫を入力'}</span>
    ${isRing
      ? `<div class="ring-size-inline" id="${varFormId}-sizes">${RING_SIZES.map(s=>`<button type="button" class="size-toggle-btn" data-size="${s}" onclick="toggleSizeBtn(this)">${s}</button>`).join('')}</div>
         <div class="inline-var-row"><span class="inline-label">初期在庫</span><input type="number" id="${varFormId}-stock" value="0" min="0" onfocus="this.select()" style="width:56px"></div>`
      : `<div class="inline-var-row">
           <span class="inline-label">名前</span>
           <input type="text" id="${varFormId}-name" placeholder="例: シルバー、#13">
           <span class="inline-label">在庫</span>
           <input type="number" id="${varFormId}-stock" value="0" min="0" onfocus="this.select()">
         </div>`
    }
    <div class="inline-var-actions">
      <button class="btn-inline btn-inline-ok" onclick="saveInlineVar('${eq(p.name)}','${varFormId}',${isRing})">追加する</button>
      <button class="btn-inline" onclick="closeInlineVarForm('${varFormId}')">キャンセル</button>
    </div>
  </div>`;

  html+=`<button class="memo-toggle-btn${hasMemo?' memo-has-content':''}" onclick="toggleMemo(this)">${hasMemo?'📝 '+eh(memoPreview):'＋ メモを追加'}</button>
    <div class="memo-wrap hidden">
      <textarea class="memo-input" placeholder="受注状況・補充予定・備考など..."
        onchange="saveMemo('${eq(p.name)}',this)"
        oninput="saveMemo('${eq(p.name)}',this)">${eh(memo)}</textarea>
    </div>`;

  html+=`</div>`;
  return html;
}

function saveStockBtn(btn, name, variation){
  // 同じ行のinputを探す
  const input = btn.closest('tr,div')?.querySelector('input[type=number]');
  const val = parseInt(input?.value)||0;
  setStock(name, variation||null, val);
  btn.textContent='✓ 保存済';
  btn.classList.add('saved');
  setTimeout(()=>{ btn.textContent='保存'; btn.classList.remove('saved'); }, 2000);
}

// ========== STATUS / MEMO ==========
function toggleStatus(name,el){
  const next=getStatus(name)==='active'?'stopped':'active';
  statusData[name]=next; updateStats(); saveToLocal();
  sbUpsert(name+'::__status', { status: next });
  const isStopped=next==='stopped';
  el.classList.toggle('stopped',isStopped);
  el.querySelector('.status-label').textContent=isStopped?'販売停止':'販売中';
  el.closest('.product-card').classList.toggle('stopped',isStopped);
}

function syncBadge(input,isVar){
  const val=parseInt(input.value)||0;
  const cls=getStockClass(val);
  input.className=input.className.replace(/\b(zero|low|ok)\b/g,'').trim()+' '+cls;
  let badge=input.nextElementSibling;
  if(!badge||!badge.classList.contains('stock-badge')) badge=input.parentElement?.querySelector?.('.stock-badge');
  if(badge){ badge.className=`stock-badge badge-${cls}`; badge.textContent=getBadgeLabel(cls,isVar); }
  updateStats();
}

async function syncBadgeAndSave(input, isVar, name, variation){
  syncBadge(input, isVar);
  const val=parseInt(input.value)||0;
  await sbUpsert(skey(name, variation||null), { stock: val });
}

function toggleMemo(btn){
  const wrap=btn.nextElementSibling;
  const isHidden=wrap.classList.toggle('hidden');
  if(!isHidden) wrap.querySelector('textarea').focus();
}

function saveMemo(name,textarea){
  const val=textarea.value;
  memoData[name]=val; saveToLocal();
  sbUpsert(name+'::__memo', { memo: val });
  const hasMemo=val.trim()!=='';
  const btn=textarea.closest('.memo-wrap').previousElementSibling;
  btn.classList.toggle('memo-has-content',hasMemo);
  const preview=hasMemo?(val.length>28?val.slice(0,28)+'…':val):'';
  btn.textContent=hasMemo?'📝 '+preview:'＋ メモを追加';
}

// ========== MORE MENU ==========
function toggleMoreMenu(btn){
  const menu = btn.nextElementSibling;
  menu.classList.toggle('hidden');
  // 外クリックで閉じる
  setTimeout(()=>{
    document.addEventListener('click', function handler(e){
      if(!btn.contains(e.target) && !menu.contains(e.target)){
        menu.classList.add('hidden');
        document.removeEventListener('click', handler);
      }
    });
  }, 10);
}
function closeMoreMenu(){
  document.querySelectorAll('.more-menu').forEach(m=>m.classList.add('hidden'));
}
function openFilterMenu(){
  document.getElementById('filterDrawer').classList.toggle('hidden');
}

// ========== GENRE NAV ==========
function scrollToCategory(cat){
  const id='cat-'+cat.replace(/[・\s]/g,'-');
  const el=document.getElementById(id);
  if(!el){ showToast('このフィルター条件では表示されていません'); return; }
  const offset=el.getBoundingClientRect().top + window.scrollY - 120;
  window.scrollTo({top:offset, behavior:'smooth'});
  // ハイライト
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  const btn=[...document.querySelectorAll('.genre-btn')].find(b=>b.textContent===cat);
  if(btn) btn.classList.add('active');
  setTimeout(()=>{ if(btn) btn.classList.remove('active'); }, 1500);
}

function toggleSizeBtn(btn){
  btn.classList.toggle('selected');
}

// ========== INLINE VARIATION ADD ==========
function toggleInlineVarForm(name, formId, isRing, btn){
  const form=document.getElementById(formId);
  const isOpen=form.classList.toggle('open');
  btn.textContent=isOpen?'▲ 閉じる':'＋ バリエーション / サイズを追加';
}

function closeInlineVarForm(formId){
  const form=document.getElementById(formId);
  form.classList.remove('open');
  const btn=form.previousElementSibling;
  if(btn) btn.textContent='＋ バリエーション / サイズを追加';
}

function saveInlineVar(name, formId, isRing){
  const stockInput=document.getElementById(formId+'-stock');
  const initStock=parseInt(stockInput?.value)||0;
  const p=getAllProducts().find(x=>x.name===name);
  if(!p) return;

  if(isRing){
    const checked=[...document.querySelectorAll(`#${formId}-sizes .size-toggle-btn.selected`)].map(b=>b.dataset.size);
    if(!checked.length){ alert('号数を1つ以上選択してください'); return; }
    const existing=new Set(p.variations.map(v=>v.variation));
    checked.forEach(s=>{
      if(!existing.has(s)){
        p.variations.push({variation:s});
        stockData[skey(name,s)]=initStock;
        sbUpsert(skey(name,s), { stock: initStock });
      }
    });
  } else {
    const nameInput=document.getElementById(formId+'-name');
    const varName=nameInput?.value.trim();
    if(!varName){ alert('バリエーション名を入力してください'); return; }
    if(p.variations.find(v=>v.variation===varName)){ alert('同名のバリエーションがすでに存在します'); return; }
    p.variations.push({variation:varName});
    stockData[skey(name,varName)]=initStock;
    sbUpsert(skey(name,varName), { stock: initStock });
  }

  saveToLocal();

  // スクロール位置を保持したままカード再描画
  const scrollY = window.scrollY;
  const card=document.getElementById(formId)?.closest('.product-card');
  if(card){ card.outerHTML=renderCard(p); }
  window.scrollTo(0, scrollY);

  updateStats();
  showToast('バリエーションを追加しました');
}

// ========== ADD PRODUCT MODAL ==========
let currentProductType='simple';

function openAddModal(){
  document.getElementById('addModal').classList.remove('hidden');
  document.getElementById('newName').value='';
  document.getElementById('newPrice').value='';
  document.getElementById('newStock').value='0';
  document.getElementById('newSize').value='';
  // バリエーションリストリセット
  document.getElementById('varList').innerHTML=`<div class="var-item"><input type="text" placeholder="例：シルバー、#7、S など"><button class="var-remove" onclick="removeVar(this)">×</button></div>`;
  // リングサイズリセット
  buildRingSizes();
  setProductType('simple', document.querySelector('.type-tab'));
}

function closeAddModal(){ document.getElementById('addModal').classList.add('hidden'); }
function closeModalIfOverlay(e){ if(e.target===document.getElementById('addModal')) closeAddModal(); }

function setProductType(type, el){
  currentProductType=type;
  document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('simpleSection').style.display=type==='simple'?'':'none';
  document.getElementById('variationSection').style.display=type==='variation'?'':'none';
  document.getElementById('ringSizeSection').style.display=type==='ring'?'':'none';
  // リングの場合はジャンルを自動でリングに
  if(type==='ring') document.getElementById('newCategory').value='リング';
}

function buildRingSizes(){
  const wrap=document.getElementById('ringSizes');
  wrap.innerHTML=RING_SIZES.map(s=>`
    <label class="size-check">
      <input type="checkbox" value="${s}">
      <span>${s}</span>
    </label>`).join('');
}

function addVarRow(){
  const list=document.getElementById('varList');
  const div=document.createElement('div');
  div.className='var-item';
  div.innerHTML=`<input type="text" placeholder="例：シルバー、#7、S など"><button class="var-remove" onclick="removeVar(this)">×</button>`;
  list.appendChild(div);
}

function removeVar(btn){
  const item=btn.parentElement;
  const list=document.getElementById('varList');
  if(list.children.length>1) item.remove();
}

function addProduct(){
  const name=document.getElementById('newName').value.trim();
  const cat=document.getElementById('newCategory').value;
  const price=parseInt(document.getElementById('newPrice').value)||0;
  const initStock=parseInt(document.getElementById('newStock').value)||0;

  if(!name){ alert('商品名を入力してください'); return; }
  if(!price){ alert('価格を入力してください'); return; }
  if(getAllProducts().find(p=>p.name===name)){ alert('同名の商品がすでに存在します'); return; }

  let newProduct = { name, price, variations: [], isRing: currentProductType==='ring' };

  if(currentProductType==='simple'){
    // バリエーションなし
    const sz=document.getElementById('newSize').value.trim();
    stockData[skey(name,null)]=initStock;
    if(sz) sizeData[skey(name,null)]=sz;

  } else if(currentProductType==='variation'){
    // バリエーションあり
    const inputs=document.querySelectorAll('#varList .var-item input');
    const vars=[...inputs].map(i=>i.value.trim()).filter(Boolean);
    if(!vars.length){ alert('バリエーションを1つ以上入力してください'); return; }
    newProduct.variations=vars.map(v=>({variation:v}));
    vars.forEach(v=>{ stockData[skey(name,v)]=initStock; });

  } else if(currentProductType==='ring'){
    // リングサイズ
    const checked=[...document.querySelectorAll('#ringSizes input:checked')].map(c=>c.value);
    if(!checked.length){ alert('サイズを1つ以上選択してください'); return; }
    newProduct.variations=checked.map(s=>({variation:s}));
    checked.forEach(s=>{ stockData[skey(name,s)]=initStock; });
    newProduct.isRing=true;
  }

  customProducts.push(newProduct);
  productCategories[name]=cat;
  saveToLocal();
  closeAddModal();
  renderProducts();
  showToast(`「${name}」を追加しました`);
}

// ========== RESET / EXPORT ==========
function resetAll(){
  if(!confirm('すべての在庫・ステータス・メモ・サイズをリセットしますか？\n（追加した商品も削除されます）')) return;
  stockData={}; statusData={}; memoData={}; sizeData={};
  customProducts=[]; productCategories={};
  localStorage.removeItem(LS_KEY);
  renderProducts();
  showToast('リセットしました');
}

function exportCSV(){
  const rows=[['商品名','バリエーション','価格','サイズ','在庫数','販売ステータス','メモ','ジャンル']];
  getAllProducts().forEach(p=>{
    const st=getStatus(p.name)==='stopped'?'販売停止':'販売中';
    const memo=getMemo(p.name);
    const cat=getCategoryForProduct(p);
    if(!p.variations.length){
      const sz=getSize(p.name,null);
      rows.push([p.name,'',p.price,sz,getStock(p.name,null),st,memo,cat]);
    } else {
      p.variations.forEach((v,i)=>{
        const sz=getSize(p.name,v.variation);
        rows.push([p.name,v.variation,p.price,sz,getStock(p.name,v.variation),i===0?st:'',i===0?memo:'',i===0?cat:'']);
      });
    }
  });
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`GARAGE_在庫_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.csv`;
  a.click();
  showToast('CSVを出力しました');
}

function showToast(msg){
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// ========== INIT ==========
async function init(){
  loadFromLocal(); // まずローカルから即表示
  renderProducts();
  try {
    const rows = await sbGetAll();
    if(!Array.isArray(rows)) throw new Error('invalid response');
    const newStock={}, newStatus={}, newMemo={};
    rows.forEach(row=>{
      const id=row.id;
      if(id.endsWith('::__status')){
        newStatus[id.slice(0,-'::__status'.length)] = row.status||'active';
      } else if(id.endsWith('::__memo')){
        newMemo[id.slice(0,-'::__memo'.length)] = row.memo||'';
      } else if(id.endsWith('::__size')){
        // sizeDataは使わない（#カラム廃止）
      } else {
        newStock[id] = row.stock??0;
      }
    });

    // Supabaseにあるバリエーションで既存商品に未登録のものを復元
    const allKeys = Object.keys(newStock);
    allKeys.forEach(k=>{
      if(!k.includes('::')) return;
      const [name, variation] = k.split('::');
      const p = getAllProducts().find(x=>x.name===name);
      if(p && variation && !p.variations.find(v=>v.variation===variation)){
        p.variations.push({variation});
      }
    });

    stockData=newStock; statusData=newStatus; memoData=newMemo;
    saveToLocal();
    renderProducts();
    showToast('データを同期しました');
  } catch(e){
    console.error('Supabase同期エラー:', e);
    showToast('オフライン：ローカルデータを使用中');
  }
}

init();
